<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

  <meta charset="UTF-8">
  <title>Scan Result ❤️</title>

  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/script.js"></script>

  <style>

    body{
        background:linear-gradient(135deg,#ff758c,#ff7eb3);
        color:white;
        text-align:center;
        overflow:hidden;
    }

    .box{

        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(10px);
        padding:40px;
        border-radius:20px;
        width:90%;
        max-width:700px;
        box-shadow:0 10px 30px rgba(0,0,0,.3);

    }

    h1{

        font-size:42px;
        margin-bottom:20px;

    }

    p{

        font-size:22px;
        line-height:1.7;

    }

    button{

        margin-top:30px;

    }

  </style>

</head>

<body>

<div class="box">

  <h1>❤️ Scan Complete ❤️</h1>

  <h2>Result Found Successfully...</h2>

  <br>

  <p>

    After scanning millions of hearts ❤️,
    our system has found the most beautiful,
    kind, caring and cutest girl in the universe.

  </p>

  <br>

  <h2>
    💖 And that's YOU! 💖
  </h2>

  <p>

    But wait...
    There is one final question waiting for you.

  </p>

  <a href="/proposal">
    <button>Continue ❤️</button>
  </a>

</div>

<!-- Background Music (Optional) -->
<audio autoplay loop>
  <source src="/music/love.mp3" type="audio/mpeg">
</audio>

</body>
</html>
